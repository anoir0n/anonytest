name: Auto Refresh M3U8 Token

on:
  schedule:
    # ตั้งเวลารันอัตโนมัติ ทุกๆ 1 ชั่วโมง (ปรับเปลี่ยนเวลาตามรูปแบบ Cron job ได้)
    - cron: '0 * * * *'
  workflow_dispatch: # ปุ่มกดสั่งให้รันเองแบบ Manual บนหน้าเว็บ GitHub

jobs:
  refresh-link:
    runs-on: ubuntu-latest

    steps:
    # 1. ดึงโค้ดใน Repository ออกมาทำงาน
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. ติดตั้ง Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    # 3. ติดตั้งไลบรารีที่จำเป็น (requests)
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    # 4. สั่งรันสคริปต์เพื่ออัปเดต Token ล่าสุด
    - name: Run Scraper Script
      run: python update.py

    # 5. บันทึกไฟล์ playlist.m3u ที่ได้กลับเข้าสู่คลัง GitHub ของเรา
    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add playlist.m3u
        # ตรวจสอบว่าไฟล์มีการเปลี่ยนแปลงจริงไหม ถ้ามีให้ทำการ Commit
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 อัปเดตลิงก์สตรีมมิ่งประจำชั่วโมง" && git push)
