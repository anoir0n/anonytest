name: Auto Update Playlists

on:
  schedule:
    # ตั้งค่าให้ระบบตรวจจับและอัปเดต Token ทุกๆ 3 ชั่วโมงอัตโนมัติ
    - cron: '0 */3 * * *'
  workflow_dispatch: # เปิดปุ่มแมนนวลให้เรากดสั่งรันเองเมื่อไหร่ก็ได้

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # เปิดสิทธิ์ให้ GitHub Actions บันทึกและเขียนไฟล์ลงคลังได้

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Scraper Script
      run: python update_links.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add playlist.m3u playlist.w3u
        
        # ตรวจสอบว่าลิงก์มีการเปลี่ยนจริงไหม ถ้าไม่เปลี่ยนจะไม่บันทึกซ้ำเพื่อไม่ให้รกประวัติ
        if git diff --staged --quiet; then
          echo "Token ยังเป็นตัวเดิม ไม่มีการเปลี่ยนแปลง"
        else
          git commit -m "Auto-updated playlist tokens [skip ci]"
          git push
        fi
