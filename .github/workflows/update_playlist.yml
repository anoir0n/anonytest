name: Auto Update M3U Playlist

on:
  schedule:
    # สั่งให้รันอัตโนมัติทุกๆ 6 ชั่วโมง (ปรับเวลาได้ตามสะดวก)
    - cron: '0 */6 * * *'
  workflow_dispatch: # เปิดให้เราสามารถกดสั่งรันมือเองได้ด้วย

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
    # 1. ดึงโค้ดจากกิตฮับลงมา
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. ตั้งค่าระบบ Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. ติดตั้งไลบรารีและบราวเซอร์จำลอง
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    # 4. สั่งรันสคริปต์ดูดลิงก์เพื่อสร้างไฟล์ m3u ใหม่
    - name: Run Scraper
      run: python scraper.py

    # 5. สั่งให้บอทเซฟไฟล์และอัปโหลดกลับขึ้น GitHub อัตโนมัติ
    - name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add playlist.m3u
        git commit -m "Automated Playlist Update [skip ci]" || exit 0
        git push
