name: StreamHub Auto RTMP Fetcher

on:
  schedule:
    - cron: '0 */6 * * *'  # รันอัตโนมัติทุกๆ 6 ชั่วโมง (ปรับเวลาได้ตามต้องการ)
  workflow_dispatch:      # เปิดให้มีปุ่มกดสั่งรันเองได้ทันทีผ่านหน้าเว็บ GitHub

jobs:
  run-streamhub:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install requests

    - name: Execute StreamHub Script
      run: python StreamHub.py

    - name: Commit and Push Updated Playlist
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add StreamHub.w3u
        # เช็กว่าไฟล์มีการเปลี่ยนแปลงจริงไหม ถ้าจริงให้เซฟทับตัวเก่าขึ้นคลัง GitHub
        git diff-index --quiet HEAD || git commit -m "Auto-refresh StreamHub.w3u RTMP list"
        git push
